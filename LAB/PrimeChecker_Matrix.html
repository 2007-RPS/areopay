<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeChecker_Matrix — Code Visualizer</title>
<style>
  /* ── Reset & Base ───────────────────────────────────── */
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f111a;color:#d6deeb;min-height:100vh;display:flex;flex-direction:column}

  /* ── Header ─────────────────────────────────────────── */
  header{text-align:center;padding:24px 16px 12px;background:#1a1e2e;border-bottom:1px solid #2a3050}
  header h1{font-size:1.6rem;color:#82aaff}
  header p{font-size:.85rem;color:#7f8bb0;margin-top:4px}

  /* ── Layout: 3 columns ─────────────────────────────── */
  .container{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;flex:1;overflow:hidden}
  @media(max-width:1100px){.container{grid-template-columns:1fr;grid-template-rows:auto auto auto}}

  /* ── Panel base ─────────────────────────────────────── */
  .panel{display:flex;flex-direction:column;border-right:1px solid #2a3050;overflow:hidden}
  .panel:last-child{border-right:none}
  .panel-title{padding:10px 16px;font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;background:#151929;color:#c792ea;border-bottom:1px solid #2a3050;position:sticky;top:0;z-index:2}

  /* ── Code Panel ─────────────────────────────────────── */
  #codePanel{overflow-y:auto;padding:0;font-size:.82rem;line-height:1.7}
  .code-line{display:flex;padding:2px 12px;cursor:pointer;transition:background .15s}
  .code-line:hover{background:#1e2340}
  .code-line.active{background:#1e3a5f;border-left:3px solid #82aaff}
  .line-no{width:32px;text-align:right;color:#4e5579;margin-right:12px;user-select:none;font-family:'Cascadia Code','Fira Code',monospace;flex-shrink:0}
  .line-code{white-space:pre;font-family:'Cascadia Code','Fira Code',monospace;flex:1}

  /* syntax colours */
  .kw{color:#c792ea} .tp{color:#ffcb6b} .fn{color:#82aaff} .cm{color:#546e7a;font-style:italic}
  .str{color:#c3e88d} .num{color:#f78c6c} .op{color:#89ddff} .br{color:#bfc7d5}

  /* ── Explanation Panel ──────────────────────────────── */
  #explainPanel{overflow-y:auto;padding:16px;font-size:.85rem;line-height:1.65}
  .explain-card{background:#1a1e2e;border:1px solid #2a3050;border-radius:8px;padding:14px 16px;margin-bottom:12px;display:none;animation:fadeIn .25s ease}
  .explain-card.visible{display:block}
  .explain-card h3{color:#c792ea;font-size:.9rem;margin-bottom:6px}
  .explain-card p{color:#a9b5d6}
  .explain-card code{background:#0d1025;padding:2px 6px;border-radius:4px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.8rem;color:#82aaff}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ── Visualizer Panel ───────────────────────────────── */
  #vizPanel{overflow-y:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:16px}

  /* Variable boxes */
  .var-box{display:inline-flex;align-items:center;gap:8px;background:#1a1e2e;border:1px solid #2a3050;border-radius:6px;padding:6px 12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.82rem}
  .var-box .vname{color:#ffcb6b}.var-box .veq{color:#89ddff}.var-box .vval{color:#c3e88d}
  .vars-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%}

  /* Matrix grid */
  #matrixWrap{width:100%}
  #matrixWrap h4{text-align:center;color:#7f8bb0;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .matrix{display:grid;grid-template-columns:40px repeat(5,1fr);gap:2px;max-width:360px;margin:0 auto}
  .matrix .hdr{font-size:.7rem;font-weight:700;color:#7f8bb0;text-align:center;padding:4px}
  .matrix .cell{text-align:center;padding:8px 4px;border-radius:4px;font-size:.78rem;font-family:'Cascadia Code','Fira Code',monospace;transition:all .25s}
  .cell.empty{background:transparent}
  .cell.val-true{background:#1b3a28;color:#c3e88d}
  .cell.val-false{background:#3a1b1b;color:#ff5370}
  .cell.highlight{outline:2px solid #82aaff;outline-offset:-2px;transform:scale(1.08);z-index:1}

  /* Console output */
  #consoleOut{width:100%;background:#0d1025;border:1px solid #2a3050;border-radius:6px;padding:10px 14px;font-family:'Cascadia Code','Fira Code',monospace;font-size:.78rem;color:#a9b5d6;min-height:60px;white-space:pre-wrap}
  #consoleOutTitle{font-size:.75rem;text-transform:uppercase;color:#7f8bb0;letter-spacing:1px;text-align:center}

  /* isPrime call visualizer */
  #primeCallBox{width:100%;background:#1a1e2e;border:1px solid #2a3050;border-radius:6px;padding:12px;text-align:center;font-size:.82rem;min-height:42px;display:flex;align-items:center;justify-content:center;gap:8px}
  .prime-true{color:#c3e88d;font-weight:700}
  .prime-false{color:#ff5370;font-weight:700}

  /* ── Controls bar ───────────────────────────────────── */
  .controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:12px 16px;background:#151929;border-top:1px solid #2a3050}
  .controls button{padding:8px 20px;border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
  .controls button:active{transform:scale(.96)}
  #prevBtn,#nextBtn{background:#1e3a5f;color:#82aaff}
  #prevBtn:hover,#nextBtn:hover{background:#264a73}
  #playBtn{background:#2a6b3f;color:#c3e88d}
  #playBtn:hover{background:#358a4f}
  #playBtn.playing{background:#6b2a2a;color:#ff5370}
  #resetBtn{background:#3a2050;color:#c792ea}
  #resetBtn:hover{background:#4a2a66}
  .step-info{color:#7f8bb0;font-size:.8rem;min-width:80px;text-align:center}
  .speed-ctl{display:flex;align-items:center;gap:6px;color:#7f8bb0;font-size:.78rem}
  .speed-ctl input{width:80px;accent-color:#82aaff}
</style>
</head>
<body>

<header>
  <h1>PrimeChecker_Matrix.java — Interactive Visualizer</h1>
  <p>Step through the code line-by-line &middot; Watch the matrix build in real-time</p>
</header>

<div class="container">
  <!-- ─── Code Panel ────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Source Code</div>
    <div id="codePanel"></div>
  </div>

  <!-- ─── Explanation Panel ─────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Line-by-Line Explanation</div>
    <div id="explainPanel"></div>
  </div>

  <!-- ─── Visualizer Panel ──────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Live Visualizer</div>
    <div id="vizPanel">
      <div class="vars-row" id="varsRow"></div>
      <div id="primeCallBox">Click <b>Next</b> or <b>Play</b> to begin</div>
      <div id="matrixWrap">
        <h4>Boolean Matrix A[5][5]</h4>
        <div class="matrix" id="matrixGrid"></div>
      </div>
      <div id="consoleOutTitle">Console Output</div>
      <div id="consoleOut"></div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button id="resetBtn">Reset</button>
  <button id="prevBtn">&larr; Prev</button>
  <span class="step-info" id="stepInfo">Step 0 / 0</span>
  <button id="nextBtn">Next &rarr;</button>
  <button id="playBtn">&#9654; Play</button>
  <div class="speed-ctl">
    <label for="speedSlider">Speed</label>
    <input type="range" id="speedSlider" min="100" max="2000" value="800" step="100">
  </div>
</div>

<script>
/* ================================================================
   DATA: source lines + explanations + execution steps
   ================================================================ */

// Raw source code lines (cleaned, no doc-comments for brevity in display)
const sourceLines = [
  { code: `<span class="kw">public class</span> <span class="tp">PrimeChecker_Matrix</span> {`, id: 'class-decl' },
  { code: ``, id: 'blank1' },
  { code: `    <span class="kw">static boolean</span> <span class="fn">isPrime</span>(<span class="kw">int</span> n) {`, id: 'isPrime-sig' },
  { code: `        <span class="kw">if</span> (n < <span class="num">2</span>) <span class="kw">return false</span>;`, id: 'isPrime-lt2' },
  { code: `        <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">2</span>; i <= n / <span class="num">2</span>; i++)`, id: 'isPrime-for' },
  { code: `            <span class="kw">if</span> (n % i == <span class="num">0</span>) <span class="kw">return false</span>;`, id: 'isPrime-div' },
  { code: `        <span class="kw">return true</span>;`, id: 'isPrime-ret' },
  { code: `    }`, id: 'isPrime-end' },
  { code: ``, id: 'blank2' },
  { code: `    <span class="kw">public static void</span> <span class="fn">main</span>(<span class="tp">String</span>[] args) {`, id: 'main-sig' },
  { code: `        <span class="kw">int</span> m = <span class="num">5</span>;`, id: 'main-m' },
  { code: `        <span class="kw">boolean</span>[][] A = <span class="kw">new boolean</span>[m][m];`, id: 'main-A' },
  { code: ``, id: 'blank3' },
  { code: `        <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">0</span>; i < m; i++)`, id: 'outer-for' },
  { code: `            <span class="kw">for</span> (<span class="kw">int</span> j = <span class="num">0</span>; j < m; j++)`, id: 'inner-for' },
  { code: `                A[i][j] = !(isPrime(i) && isPrime(j));`, id: 'assign' },
  { code: ``, id: 'blank4' },
  { code: `        <span class="kw">for</span> (<span class="kw">boolean</span>[] row : A) {`, id: 'print-outer' },
  { code: `            <span class="kw">for</span> (<span class="kw">boolean</span> val : row)`, id: 'print-inner' },
  { code: `                System.out.<span class="fn">print</span>(val + <span class="str">" "</span>);`, id: 'print-val' },
  { code: `            System.out.<span class="fn">println</span>();`, id: 'print-ln' },
  { code: `        }`, id: 'print-end' },
  { code: `    }`, id: 'main-end' },
  { code: `}`, id: 'class-end' },
];

// Explanations keyed by line id
const explanations = {
  'class-decl':   { title: 'Class Declaration', text: 'Declares a <code>public class</code> named <code>PrimeChecker_Matrix</code>. In Java every program needs at least one class and the filename must match the public class name.' },
  'isPrime-sig':  { title: 'isPrime() Method Signature', text: '<code>static boolean isPrime(int n)</code> — a <b>static</b> helper method that accepts an integer <code>n</code> and returns <code>true</code> if it is a prime number, <code>false</code> otherwise. It is static so it can be called from the static <code>main()</code> method without creating an object.' },
  'isPrime-lt2':  { title: 'Base Case — n &lt; 2', text: 'If <code>n</code> is less than 2, return <code>false</code> immediately. By definition, 0 and 1 are <b>not</b> prime numbers.' },
  'isPrime-for':  { title: 'Trial Division Loop', text: 'Loop variable <code>i</code> runs from 2 to <code>n/2</code>. We test whether <code>n</code> is divisible by any of these values. We only need to go up to <code>n/2</code> because no factor greater than <code>n/2</code> (other than <code>n</code> itself) can divide <code>n</code> evenly.' },
  'isPrime-div':  { title: 'Divisibility Check', text: 'If <code>n % i == 0</code>, then <code>i</code> divides <code>n</code> evenly, meaning <code>n</code> is composite (not prime) — return <code>false</code>.' },
  'isPrime-ret':  { title: 'Return true — Prime Confirmed', text: 'If the loop completes without finding any divisor, <code>n</code> has no factors other than 1 and itself — it is prime. Return <code>true</code>.' },
  'isPrime-end':  { title: 'End of isPrime()', text: 'Closing brace of the <code>isPrime()</code> method.' },
  'main-sig':     { title: 'main() Method', text: '<code>public static void main(String[] args)</code> — the entry point of the Java program. Execution starts here.' },
  'main-m':       { title: 'Matrix Size', text: 'Declares <code>int m = 5</code>. The matrix will be 5&times;5, with row and column indices ranging from 0 to 4.' },
  'main-A':       { title: 'Create Boolean Matrix', text: '<code>boolean[][] A = new boolean[m][m]</code> — allocates a 5&times;5 2D boolean array. In Java, all boolean elements default to <code>false</code>.' },
  'outer-for':    { title: 'Outer Loop — Rows', text: '<code>for (int i = 0; i &lt; m; i++)</code> — iterates through each row index (0, 1, 2, 3, 4).' },
  'inner-for':    { title: 'Inner Loop — Columns', text: '<code>for (int j = 0; j &lt; m; j++)</code> — for each row <code>i</code>, iterates through every column index (0, 1, 2, 3, 4).' },
  'assign':       { title: 'Populate Cell', text: '<code>A[i][j] = !(isPrime(i) && isPrime(j))</code><br><br>Calls <code>isPrime()</code> on both <code>i</code> and <code>j</code>. If <b>both</b> are prime → <code>true && true</code> → negated to <code>false</code>. Otherwise the cell is <code>true</code>.<br><br>Only indices 2 and 3 are prime (in 0–4), so cells (2,2), (2,3), (3,2), (3,3) are <code>false</code>.' },
  'print-outer':  { title: 'Print Loop — Row Iteration', text: '<code>for (boolean[] row : A)</code> — enhanced for-each loop: <code>row</code> becomes each 1D array (row) of the matrix in turn.' },
  'print-inner':  { title: 'Print Loop — Column Iteration', text: '<code>for (boolean val : row)</code> — iterates through each boolean value in the current row.' },
  'print-val':    { title: 'Print Cell Value', text: '<code>System.out.print(val + " ")</code> — prints the boolean (<code>true</code> or <code>false</code>) followed by a space, staying on the same line.' },
  'print-ln':     { title: 'Newline After Row', text: '<code>System.out.println()</code> — prints a newline character, moving console output to the next line after finishing a row.' },
  'print-end':    { title: 'End of Print Loop', text: 'Closing brace of the outer print loop.' },
  'main-end':     { title: 'End of main()', text: 'Closing brace of the <code>main()</code> method.' },
  'class-end':    { title: 'End of Class', text: 'Closing brace of <code>PrimeChecker_Matrix</code> class.' },
};

/* ================================================================
   EXECUTION STEPS — each step maps to a code line + state changes
   ================================================================ */
function isPrime(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.floor(n / 2); i++)
    if (n % i === 0) return false;
  return true;
}

function buildSteps() {
  const steps = [];
  const m = 5;

  // Step: class declaration
  steps.push({ line: 'class-decl', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });
  // Step: isPrime signature (just show it)
  steps.push({ line: 'isPrime-sig', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });
  // Step: main()
  steps.push({ line: 'main-sig', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });
  // Step: int m = 5
  steps.push({ line: 'main-m', vars: { m: 5 }, primeCall: null, matrixUpdate: null, consoleAppend: null });
  // Step: boolean[][] A = new boolean[m][m]
  steps.push({ line: 'main-A', vars: { m: 5 }, primeCall: null, matrixUpdate: 'init', consoleAppend: null });

  // Populate matrix
  for (let i = 0; i < m; i++) {
    steps.push({ line: 'outer-for', vars: { m, i }, primeCall: null, matrixUpdate: null, consoleAppend: null });
    for (let j = 0; j < m; j++) {
      steps.push({ line: 'inner-for', vars: { m, i, j }, primeCall: null, matrixUpdate: null, consoleAppend: null });
      const pi = isPrime(i), pj = isPrime(j);
      const val = !(pi && pj);
      steps.push({
        line: 'assign',
        vars: { m, i, j },
        primeCall: { i, j, pi, pj, result: val },
        matrixUpdate: { i, j, val },
        consoleAppend: null
      });
    }
  }

  // Print matrix
  const matrix = [];
  for (let i = 0; i < m; i++) {
    matrix[i] = [];
    for (let j = 0; j < m; j++) matrix[i][j] = !(isPrime(i) && isPrime(j));
  }

  for (let i = 0; i < m; i++) {
    steps.push({ line: 'print-outer', vars: { m, row_i: i }, primeCall: null, matrixUpdate: null, consoleAppend: null, highlightRow: i });
    for (let j = 0; j < m; j++) {
      steps.push({ line: 'print-inner', vars: { m, row_i: i, col_j: j, val: matrix[i][j] }, primeCall: null, matrixUpdate: null, consoleAppend: null, highlightCell: [i, j] });
      steps.push({ line: 'print-val', vars: { m, row_i: i, col_j: j, val: matrix[i][j] }, primeCall: null, matrixUpdate: null, consoleAppend: matrix[i][j] + ' ', highlightCell: [i, j] });
    }
    steps.push({ line: 'print-ln', vars: { m, row_i: i }, primeCall: null, matrixUpdate: null, consoleAppend: '\n' });
  }
  // End braces
  steps.push({ line: 'print-end', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });
  steps.push({ line: 'main-end', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });
  steps.push({ line: 'class-end', vars: {}, primeCall: null, matrixUpdate: null, consoleAppend: null });

  return steps;
}

const steps = buildSteps();
let currentStep = -1;
let playing = false;
let playTimer = null;

// Matrix state (5x5, null = not yet set)
const matrixState = Array.from({ length: 5 }, () => Array(5).fill(null));
let consoleText = '';

/* ================================================================
   RENDER FUNCTIONS
   ================================================================ */

// Render code panel
function renderCode() {
  const panel = document.getElementById('codePanel');
  panel.innerHTML = sourceLines.map((l, idx) => {
    return `<div class="code-line" data-id="${l.id}" onclick="jumpToLine('${l.id}')">
      <span class="line-no">${idx + 1}</span><span class="line-code">${l.code || '&nbsp;'}</span>
    </div>`;
  }).join('');
}

// Render explanation cards (hidden by default)
function renderExplanations() {
  const panel = document.getElementById('explainPanel');
  panel.innerHTML = Object.entries(explanations).map(([id, ex]) => {
    return `<div class="explain-card" data-id="${id}"><h3>${ex.title}</h3><p>${ex.text}</p></div>`;
  }).join('');
}

// Build empty matrix grid
function renderMatrixGrid() {
  const grid = document.getElementById('matrixGrid');
  let html = '<div class="cell empty"></div>';
  for (let j = 0; j < 5; j++) html += `<div class="hdr">j=${j}</div>`;
  for (let i = 0; i < 5; i++) {
    html += `<div class="hdr">i=${i}</div>`;
    for (let j = 0; j < 5; j++) {
      html += `<div class="cell" id="mc-${i}-${j}">—</div>`;
    }
  }
  grid.innerHTML = html;
}

// Update the visual for a single matrix cell
function updateMatrixCell(i, j, val) {
  const cell = document.getElementById(`mc-${i}-${j}`);
  cell.textContent = String(val);
  cell.className = 'cell val-' + val;
}

// Highlight a cell in the matrix
function highlightMatrixCell(i, j) {
  document.querySelectorAll('.matrix .cell').forEach(c => c.classList.remove('highlight'));
  if (i !== null && j !== null) {
    const cell = document.getElementById(`mc-${i}-${j}`);
    if (cell) cell.classList.add('highlight');
  }
}

// Update variables display
function renderVars(vars) {
  const row = document.getElementById('varsRow');
  if (!vars || Object.keys(vars).length === 0) { row.innerHTML = ''; return; }
  row.innerHTML = Object.entries(vars).map(([k, v]) => {
    return `<div class="var-box"><span class="vname">${k}</span><span class="veq">=</span><span class="vval">${v}</span></div>`;
  }).join('');
}

// Update isPrime call box
function renderPrimeCall(info) {
  const box = document.getElementById('primeCallBox');
  if (!info) { return; }
  const piClass = info.pi ? 'prime-true' : 'prime-false';
  const pjClass = info.pj ? 'prime-true' : 'prime-false';
  const resClass = info.result ? 'prime-true' : 'prime-false';
  box.innerHTML = `isPrime(${info.i}) → <span class="${piClass}">${info.pi}</span> &nbsp;&&nbsp; isPrime(${info.j}) → <span class="${pjClass}">${info.pj}</span> &nbsp;⇒&nbsp; !( ) = <span class="${resClass}">${info.result}</span>`;
}

/* ================================================================
   STEP NAVIGATION
   ================================================================ */

function applyStep(idx) {
  if (idx < 0 || idx >= steps.length) return;
  const step = steps[idx];

  // Highlight active code line
  document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
  const activeLine = document.querySelector(`.code-line[data-id="${step.line}"]`);
  if (activeLine) {
    activeLine.classList.add('active');
    activeLine.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Show matching explanation
  document.querySelectorAll('.explain-card').forEach(c => c.classList.remove('visible'));
  const card = document.querySelector(`.explain-card[data-id="${step.line}"]`);
  if (card) {
    card.classList.add('visible');
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Variables
  renderVars(step.vars);

  // Prime call info
  if (step.primeCall) renderPrimeCall(step.primeCall);

  // Matrix update
  if (step.matrixUpdate === 'init') {
    for (let i = 0; i < 5; i++) for (let j = 0; j < 5; j++) {
      matrixState[i][j] = false;
      updateMatrixCell(i, j, false);
    }
  } else if (step.matrixUpdate) {
    const { i, j, val } = step.matrixUpdate;
    matrixState[i][j] = val;
    updateMatrixCell(i, j, val);
    highlightMatrixCell(i, j);
  }

  // Highlight cell during printing
  if (step.highlightCell) {
    highlightMatrixCell(step.highlightCell[0], step.highlightCell[1]);
  } else if (!step.matrixUpdate || step.matrixUpdate === 'init') {
    highlightMatrixCell(null, null);
  }

  // Console output
  if (step.consoleAppend !== null) {
    consoleText += step.consoleAppend;
    document.getElementById('consoleOut').textContent = consoleText;
  }

  // Step info
  document.getElementById('stepInfo').textContent = `Step ${idx + 1} / ${steps.length}`;
}

function goNext() {
  if (currentStep < steps.length - 1) { currentStep++; applyStep(currentStep); }
  else { stopPlay(); }
}

function goPrev() {
  // Rebuild state from scratch up to currentStep-1
  if (currentStep <= 0) return;
  const target = currentStep - 1;
  resetState();
  for (let s = 0; s <= target; s++) {
    currentStep = s;
    applyStepSilent(s);
  }
  applyStep(target);
}

// Apply step without visual scroll (for rebuild)
function applyStepSilent(idx) {
  const step = steps[idx];
  if (step.matrixUpdate === 'init') {
    for (let i = 0; i < 5; i++) for (let j = 0; j < 5; j++) {
      matrixState[i][j] = false;
      updateMatrixCell(i, j, false);
    }
  } else if (step.matrixUpdate) {
    const { i, j, val } = step.matrixUpdate;
    matrixState[i][j] = val;
    updateMatrixCell(i, j, val);
  }
  if (step.consoleAppend !== null) consoleText += step.consoleAppend;
}

function resetState() {
  currentStep = -1;
  consoleText = '';
  document.getElementById('consoleOut').textContent = '';
  for (let i = 0; i < 5; i++) for (let j = 0; j < 5; j++) {
    matrixState[i][j] = null;
    const cell = document.getElementById(`mc-${i}-${j}`);
    cell.textContent = '—';
    cell.className = 'cell';
  }
  document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.explain-card').forEach(c => c.classList.remove('visible'));
  highlightMatrixCell(null, null);
  renderVars({});
  document.getElementById('primeCallBox').innerHTML = 'Click <b>Next</b> or <b>Play</b> to begin';
  document.getElementById('stepInfo').textContent = `Step 0 / ${steps.length}`;
}

function fullReset() { stopPlay(); resetState(); }

function jumpToLine(lineId) {
  stopPlay();
  // Find last step with this line id
  let target = -1;
  for (let s = 0; s < steps.length; s++) if (steps[s].line === lineId) { target = s; break; }
  if (target < 0) return;
  resetState();
  for (let s = 0; s <= target; s++) { currentStep = s; applyStepSilent(s); }
  applyStep(target);
}

/* Auto-play */
function togglePlay() {
  if (playing) { stopPlay(); return; }
  playing = true;
  document.getElementById('playBtn').textContent = '⏸ Pause';
  document.getElementById('playBtn').classList.add('playing');
  tick();
}

function tick() {
  if (!playing) return;
  goNext();
  if (currentStep >= steps.length - 1) { stopPlay(); return; }
  const speed = parseInt(document.getElementById('speedSlider').value);
  playTimer = setTimeout(tick, speed);
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('playing');
}

/* ================================================================
   INIT
   ================================================================ */
renderCode();
renderExplanations();
renderMatrixGrid();

document.getElementById('nextBtn').addEventListener('click', () => { stopPlay(); goNext(); });
document.getElementById('prevBtn').addEventListener('click', () => { stopPlay(); goPrev(); });
document.getElementById('resetBtn').addEventListener('click', fullReset);
document.getElementById('playBtn').addEventListener('click', togglePlay);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); stopPlay(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); stopPlay(); goPrev(); }
  if (e.key === 'r' || e.key === 'R') fullReset();
  if (e.key === 'p' || e.key === 'P') togglePlay();
});
</script>

</body>
</html>
